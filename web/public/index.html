<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Agent</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; height: 100vh; overflow: hidden; }
        .sidebar {
            width: 260px; background: var(--bg-sidebar); color: var(--text-sidebar);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 16px; color: #fff; }
        .sidebar-header small { color: var(--text-muted); font-size: 12px; }
        .new-chat-btn {
            margin: 12px 16px; padding: 10px; background: rgba(255,255,255,0.1);
            border: 1px dashed rgba(255,255,255,0.3); border-radius: var(--radius);
            color: #fff; cursor: pointer; text-align: center; font-size: 14px;
        }
        .new-chat-btn:hover { background: rgba(255,255,255,0.15); }
        .sessions { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item {
            padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
            margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; justify-content: space-between;
        }
        .session-item .session-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .session-item .session-del {
            display: none; background: none; border: none; color: #ef4444;
            cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0;
        }
        .session-item:hover .session-del { display: inline; }
        .session-item:hover { background: rgba(255,255,255,0.08); }
        .session-item.active { background: rgba(59,130,246,0.3); }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .sidebar-footer a { color: var(--text-sidebar); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.ok { background: var(--success); }
        .status-dot.err { background: var(--danger); }
        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .msg {
            max-width: 75%; padding: 12px 16px; border-radius: 12px;
            font-size: 14px; line-height: 1.6; word-wrap: break-word;
        }
        .msg-user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg-agent { align-self: flex-start; background: var(--bg-card); box-shadow: var(--shadow); border-bottom-left-radius: 4px; }
        .msg-agent .source { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
        .msg-agent .latency { font-size: 11px; color: var(--text-muted); }
        .msg-files { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .msg-file-chip { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
        .welcome {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: var(--text-muted);
        }
        .welcome h1 { font-size: 24px; color: var(--text); margin-bottom: 8px; }
        .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-card); }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-row textarea {
            flex: 1; resize: none; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 10px 14px; font-size: 14px; font-family: inherit; max-height: 120px; outline: none;
        }
        .input-row textarea:focus { border-color: var(--primary); }
        .attach-btn, .mic-btn {
            width: 40px; height: 40px; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-input); cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .attach-btn:hover, .mic-btn:hover { background: var(--border); }
        .mic-btn.recording { background: #fee2e2; border-color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .msg-user .msg-files { margin-top: 6px; }
        .msg-user .msg-file-chip {
            font-size: 11px; background: rgba(255,255,255,0.2);
            padding: 2px 8px; border-radius: 10px; display: inline-block;
        }
        .msg-img-preview { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 6px; }
        .file-preview { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .file-chip {
            display: flex; align-items: center; gap: 4px;
            background: #dbeafe; color: #1e40af; padding: 4px 10px; border-radius: 12px; font-size: 12px;
        }
        .file-chip button { background: none; border: none; cursor: pointer; color: #1e40af; font-size: 14px; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: var(--bg-card); border-radius: 12px; padding: 24px;
            width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h3 { margin-bottom: 12px; }
        .modal input {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 14px; margin-bottom: 12px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>GraphRAG Agent</h2>
            <small>Temporal Knowledge Base</small>
        </div>
        <div class="new-chat-btn" onclick="newSession()">+ New Chat</div>
        <div class="sessions" id="sessions"></div>
        <div class="sidebar-footer">
            <a href="/admin.html">Admin Panel</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></span>
            <span style="font-size:13px;color:var(--text-muted)" id="kbInfo"></span>
        </div>
        <div class="messages" id="messages">
            <div class="welcome">
                <h1>Multimodal GraphRAG Agent</h1>
                <p>Ask questions about your knowledge base or upload files for analysis.</p>
            </div>
        </div>
        <div class="input-area">
            <div class="file-preview" id="filePreview"></div>
            <div class="input-row">
                <label class="attach-btn" title="Attach files">
                    <input type="file" multiple id="fileInput" style="display:none"
                           accept=".txt,.md,.pdf,.docx,.csv,.json,.jpg,.jpeg,.png,.gif,.webp,.mp3,.wav,.m4a,.mp4,.avi,.mov">
                    &#x1f4ce;
                </label>
                <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">&#x1f3a4;</button>
                <textarea id="msgInput" rows="1" placeholder="Type your message..."></textarea>
                <button class="btn btn-primary" id="sendBtn" onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <h3>API Key Required</h3>
            <p style="font-size:14px;color:var(--text-muted);margin-bottom:12px">Enter the Bearer token to access the agent.</p>
            <input type="text" id="tokenInput" placeholder="a2a-secret-key-change-me" value="">
            <button class="btn btn-primary" style="width:100%" onclick="saveToken()">Connect</button>
        </div>
    </div>

    <script>
        // ─── API ─────────────────────────────────
        var API_TOKEN = localStorage.getItem('api_token') || '';

        function apiHeaders() {
            var h = {};
            if (API_TOKEN) h['Authorization'] = 'Bearer ' + API_TOKEN;
            return h;
        }

        function apiFetch(path, opts) {
            opts = opts || {};
            var h = Object.assign({}, apiHeaders(), opts.headers || {});
            opts.headers = h;
            return fetch('/api' + path, opts);
        }

        // ─── Auth ────────────────────────────────
        function saveToken() {
            var val = document.getElementById('tokenInput').value.trim();
            if (!val) return;
            API_TOKEN = val;
            localStorage.setItem('api_token', val);
            document.getElementById('authModal').classList.add('hidden');
            checkHealth();
        }

        document.getElementById('tokenInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveToken();
        });

        if (API_TOKEN) {
            document.getElementById('authModal').classList.add('hidden');
        }

        // ─── State ───────────────────────────────
        var currentSession = null;
        var sessions = JSON.parse(localStorage.getItem('chat_sessions') || '{}');
        var attachedFiles = [];

        // ─── Health ──────────────────────────────
        function checkHealth() {
            apiFetch('/health').then(function(r) { return r.json(); }).then(function(h) {
                document.getElementById('statusDot').className = 'status-dot ok';
                document.getElementById('statusText').textContent = 'Connected';
                return apiFetch('/kb/stats').then(function(r) { return r.json(); }).then(function(s) {
                    document.getElementById('kbInfo').textContent = 'KB: ' + s.entities + ' entities, ' + s.indexed_files + ' files';
                });
            }).catch(function() {
                document.getElementById('statusDot').className = 'status-dot err';
                document.getElementById('statusText').textContent = 'Disconnected';
            });
        }
        checkHealth();
        setInterval(checkHealth, 30000);

        // ─── Sessions ────────────────────────────
        function genId() {
            return 'xxxx-xxxx'.replace(/x/g, function() { return (Math.random()*16|0).toString(16); });
        }

        function renderSessions() {
            var el = document.getElementById('sessions');
            el.innerHTML = '';
            var ids = Object.keys(sessions);
            for (var i = 0; i < ids.length; i++) {
                var id = ids[i];
                var s = sessions[id];
                var div = document.createElement('div');
                div.className = 'session-item' + (id === currentSession ? ' active' : '');
                div.setAttribute('data-id', id);

                var title = document.createElement('span');
                title.className = 'session-title';
                title.textContent = s.title || id.slice(0, 8);
                title.onclick = (function(sid) { return function() { loadSession(sid); }; })(id);
                div.appendChild(title);

                var del = document.createElement('button');
                del.className = 'session-del';
                del.innerHTML = '&times;';
                del.title = 'Delete chat';
                del.onclick = (function(sid) { return function(e) { e.stopPropagation(); deleteSession(sid); }; })(id);
                div.appendChild(del);

                el.appendChild(div);
            }
        }

        function loadSession(id) {
            currentSession = id;
            renderSessions();
            renderMessages();
        }

        function newSession() {
            var id = genId();
            sessions[id] = { title: 'New Chat', messages: [] };
            saveSessions();
            loadSession(id);
        }

        function deleteSession(id) {
            delete sessions[id];
            saveSessions();
            if (currentSession === id) {
                var remaining = Object.keys(sessions);
                currentSession = remaining.length > 0 ? remaining[0] : null;
            }
            renderSessions();
            renderMessages();
        }

        function saveSessions() {
            localStorage.setItem('chat_sessions', JSON.stringify(sessions));
        }

        renderSessions();

        // ─── Messages ────────────────────────────
        function renderMessages() {
            var el = document.getElementById('messages');
            var msgs = sessions[currentSession] ? sessions[currentSession].messages : [];
            el.innerHTML = '';
            if (msgs.length === 0) {
                el.innerHTML = '<div class="welcome"><h1>Multimodal GraphRAG Agent</h1><p>Ask questions about your knowledge base or upload files for analysis.</p></div>';
                return;
            }
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                var div = document.createElement('div');
                div.className = 'msg msg-' + m.role;
                if (m.role === 'user') {
                    var textNode = document.createElement('div');
                    textNode.textContent = m.text;
                    div.appendChild(textNode);
                    if (m.files && m.files.length > 0) {
                        var fd = document.createElement('div');
                        fd.className = 'msg-files';
                        for (var j = 0; j < m.files.length; j++) {
                            var chip = document.createElement('span');
                            chip.className = 'msg-file-chip';
                            chip.textContent = m.files[j];
                            fd.appendChild(chip);
                        }
                        div.appendChild(fd);
                    }
                } else {
                    div.innerHTML = formatMd(m.text);
                    if (m.latency) {
                        var lat = document.createElement('div');
                        lat.className = 'latency';
                        lat.textContent = (m.latency / 1000).toFixed(1) + 's';
                        div.appendChild(lat);
                    }
                }
                el.appendChild(div);
            }
            el.scrollTop = el.scrollHeight;
        }

        function formatMd(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                    .replace(/\n/g,'<br>')
                    .replace(/\[source:\s*(.+?)\]/g,'<span class="source">[source: $1]</span>');
        }

        // ─── Files ───────────────────────────────
        document.getElementById('fileInput').onchange = function() {
            for (var i = 0; i < this.files.length; i++) attachedFiles.push(this.files[i]);
            this.value = '';
            renderFilePreview();
        };

        function renderFilePreview() {
            var el = document.getElementById('filePreview');
            el.innerHTML = '';
            for (var i = 0; i < attachedFiles.length; i++) {
                var chip = document.createElement('span');
                chip.className = 'file-chip';
                chip.innerHTML = attachedFiles[i].name + ' <button onclick="removeFile(' + i + ')">&times;</button>';
                el.appendChild(chip);
            }
        }

        function removeFile(idx) {
            attachedFiles.splice(idx, 1);
            renderFilePreview();
        }

        // ─── Voice Input ─────────────────────────
        var recognition = null;
        var isRecording = false;

        function toggleMic() {
            if (isRecording) {
                stopMic();
            } else {
                startMic();
            }
        }

        function startMic() {
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Speech recognition is not supported in this browser. Use Chrome.');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = true;
            recognition.continuous = true;
            recognition.maxAlternatives = 1;

            var finalText = msgInput.value;
            var interimText = '';

            recognition.onresult = function(e) {
                interimText = '';
                for (var i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        finalText += (finalText ? ' ' : '') + e.results[i][0].transcript;
                    } else {
                        interimText += e.results[i][0].transcript;
                    }
                }
                msgInput.value = finalText + (interimText ? ' ' + interimText : '');
                msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
            };

            recognition.onerror = function(e) {
                console.error('Speech error:', e.error);
                stopMic();
            };

            recognition.onend = function() {
                if (isRecording) {
                    // Auto-restart if still recording
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('micBtn').title = 'Stop recording';
        }

        function stopMic() {
            isRecording = false;
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('micBtn').title = 'Voice input';
        }

        // ─── Send ────────────────────────────────
        var msgInput = document.getElementById('msgInput');
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function send() {
            if (isRecording) stopMic();
            var text = msgInput.value.trim();
            if (!text && attachedFiles.length === 0) return;
            if (!currentSession) newSession();

            var filesToSend = attachedFiles.slice();
            attachedFiles = [];
            renderFilePreview();

            var fileNames = filesToSend.map(function(f) { return f.name; });
            sessions[currentSession].messages.push({ role: 'user', text: text, files: fileNames });
            if (sessions[currentSession].messages.length === 1) {
                sessions[currentSession].title = text.slice(0, 40);
            }
            saveSessions();
            renderMessages();
            renderSessions();

            msgInput.value = '';
            msgInput.style.height = 'auto';
            var sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span>';

            var promise;
            if (filesToSend.length > 0) {
                var fd = new FormData();
                fd.append('message', text || 'Describe the attached file(s).');
                fd.append('session_id', currentSession);
                for (var i = 0; i < filesToSend.length; i++) fd.append('files', filesToSend[i]);
                promise = fetch('/api/chat/multimodal', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + API_TOKEN },
                    body: fd
                });
            } else {
                promise = fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_TOKEN
                    },
                    body: JSON.stringify({ message: text, session_id: currentSession })
                });
            }

            promise.then(function(res) {
                if (res.status === 401 || res.status === 403) {
                    throw new Error('Invalid API key. Open Admin Panel to update it.');
                }
                if (!res.ok) {
                    return res.text().then(function(t) {
                        try { var d = JSON.parse(t); throw new Error(d.detail || 'Server error ' + res.status); }
                        catch(e) { if (e.message.indexOf('Server error') >= 0 || e.message.indexOf('API key') >= 0) throw e; throw new Error('Server error: ' + res.status); }
                    });
                }
                return res.json();
            }).then(function(data) {
                if (data && data.answer) {
                    sessions[currentSession].messages.push({
                        role: 'agent', text: data.answer, latency: data.latency_ms
                    });
                    saveSessions();
                    renderMessages();
                }
            }).catch(function(err) {
                sessions[currentSession].messages.push({ role: 'agent', text: 'Error: ' + err.message });
                saveSessions();
                renderMessages();
                if (err.message.indexOf('API key') >= 0) {
                    document.getElementById('authModal').classList.remove('hidden');
                }
            }).finally(function() {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            });
        }
    </script>
</body>
</html>
