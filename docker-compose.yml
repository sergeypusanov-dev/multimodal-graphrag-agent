services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports: ["6333:6333","6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]
    deploy:
      resources:
        limits: {memory: 4G}
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=64MB
      -c max_connections=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U agent -d agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports: ["11434:11434"]
    volumes: [ollama_data:/root/.ollama]
    dns: ["8.8.8.8", "8.8.4.4"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  agent:
    build: {context: ., dockerfile: Dockerfile}
    container_name: agent-api
    dns: ["8.8.8.8", "8.8.4.4"]
    ports: ["8100:8000","9190:9090"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - knowledge_data:/data/knowledge
    env_file: [.env]
    environment:
      POSTGRES_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/agent_db
      REDIS_URL: redis://redis:6379/0
      WATCHDOG_POLLING: "false"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      qdrant:   {condition: service_healthy}
      ollama:   {condition: service_healthy}
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build: {context: ., dockerfile: Dockerfile}
    container_name: celery-worker
    dns: ["8.8.8.8", "8.8.4.4"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - knowledge_data:/data/knowledge
    env_file: [.env]
    environment:
      POSTGRES_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/agent_db
      REDIS_URL: redis://redis:6379/0
      WATCHDOG_POLLING: "false"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    restart: unless-stopped
    command: celery -A tasks.watcher worker --loglevel=info -Q indexing,default -c 2

  celery-beat:
    build: {context: ., dockerfile: Dockerfile}
    container_name: celery-beat
    volumes: [./config.yaml:/app/config.yaml:ro]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/agent_db
    depends_on:
      redis: {condition: service_healthy}
    restart: unless-stopped
    command: celery -A tasks.watcher beat --loglevel=info

volumes:
  qdrant_data:
  redis_data:
  pg_data:
  knowledge_data:
  ollama_data:
